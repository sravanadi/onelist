<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Crazy Games SDK (Must be first) -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <!-- Yandex Games SDK -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-D7YLJ1eA.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CLflxaR1.css">
    <link rel="stylesheet" id="fonts-code" href="https://miaoda-font.cdn.bcebos.com/static/font_v1/fonts-code.css">
    <style>
      /* === IFRAME EMBED OVERRIDES === */
      /* Prevent ALL scrolling */
      html, body {
        overflow: hidden !important;
        height: 100% !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        position: fixed !important;
        touch-action: manipulation !important;
      }

      #root {
        overflow: hidden !important;
        height: 100% !important;
        width: 100% !important;
        position: fixed !important;
        top: 0;
        left: 0;
      }

      /* Lock the entire app layout to viewport, no scroll */
      #root > div {
        overflow: hidden !important;
        overflow-y: hidden !important;
        height: 100vh !important;
        max-height: 100vh !important;
        display: flex !important;
        flex-direction: column !important;
      }

      /* Main area - fill remaining space, no scroll */
      #root > div > main {
        overflow: hidden !important;
        flex: 1 !important;
        min-height: 0 !important;
        padding: 0 !important;
        gap: 4px !important;
        justify-content: center !important;
      }

      /* Title/Logo area - compact fixed height */
      #root > div > main > div:first-child {
        flex-shrink: 0 !important;
        gap: 4px !important;
        padding: 0 !important;
      }

      /* Make the cat icon smaller */
      #root > div > main > div:first-child > div:first-child {
        width: 36px !important;
        height: 36px !important;
        min-width: 36px !important;
        min-height: 36px !important;
        border-radius: 10px !important;
        border-width: 2px !important;
      }

      #root > div > main > div:first-child > div:first-child span {
        font-size: 20px !important;
      }

      /* Title text - smaller */
      .prominent-title {
        font-size: clamp(1.2rem, 6vw, 2.5rem) !important;
        filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.6)) !important;
        line-height: 1 !important;
      }

      /* Divider line - thinner */
      #root > div > main > div:first-child > div:last-child > div:last-child {
        height: 2px !important;
      }

      /* Game + Nav wrapper - fill remaining space */
      #root > div > main > div:last-child {
        flex: 1 !important;
        min-height: 0 !important;
        gap: 6px !important;
      }

      /* Game container - fill available space */
      #root > div > main > div:last-child > div:first-child {
        flex: 1 !important;
        min-height: 0 !important;
        max-width: 100% !important;
        aspect-ratio: unset !important;
        width: 100% !important;
        border-radius: 12px !important;
        border-width: 4px !important;
      }

      /* Canvas fills the game container */
      canvas {
        width: 100% !important;
        height: 100% !important;
        aspect-ratio: unset !important;
        object-fit: contain !important;
        display: block !important;
      }

      /* Nav bar - fixed at bottom, compact */
      .prominent-nav {
        flex-shrink: 0 !important;
        padding: 6px 8px !important;
        border-radius: 14px !important;
        gap: 6px !important;
        border-width: 2px !important;
        width: 100% !important;
        max-width: 100% !important;
        box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5) !important;
      }

      .prominent-button {
        padding: 8px 14px !important;
        font-size: 0.7rem !important;
        border-radius: 10px !important;
        flex: 1 !important;
      }

      .prominent-button:active {
        transform: scale(0.95) !important;
      }

      /* On larger screens inside iframe */
      @media (min-width: 480px) {
        .prominent-nav {
          padding: 8px 12px !important;
          gap: 8px !important;
        }
        .prominent-button {
          padding: 10px 18px !important;
          font-size: 0.8rem !important;
        }
        .prominent-title {
          font-size: clamp(1.5rem, 7vw, 3rem) !important;
        }
      }

      /* Desktop inside iframe - keep horizontal layout */
      @media (min-width: 1024px) {
        .prominent-nav {
          flex-direction: row !important;
          width: 100% !important;
          height: auto !important;
        }
      }

      /* Animation classes needed by the game */
      .animate-in {
        animation-duration: 0.5s;
        animation-fill-mode: both;
      }
      .fade-in {
        animation-name: fadeIn;
      }
      .zoom-in {
        animation-name: zoomIn;
      }
      .slide-in-from-top-12 {
        animation-name: slideInFromTop;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes zoomIn {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      @keyframes slideInFromTop {
        from { transform: translateY(-3rem); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
    </style>
  </head>
  <body class="dark:bg-gray-900 w-full h-full max-w-full max-h-full">
    <div id="root" class="w-screen h-screen max-w-full max-h-full"></div>
    <script id="md-click">
              window.mdClick = e => {
                const target = e.target;
                const {href, target: linkTarget} = target.dataset;
                const appType = 'web';
                const isBlank = linkTarget === '_blank';

                if (!href) return;

                e.stopPropagation();
                e.preventDefault();

                if (isBlank || href.startsWith('http')) {
                  let finalHref = href;
                  if (appType === 'miniapp' && !href.startsWith('http')) {
                    finalHref = window.location.href.split('#')[0] + '#/' + href;
                  }
                  window.open(finalHref, linkTarget || '_self');
                  return;
                }

                const finalHref = href.startsWith('/') ? href : '/' + href;
                if (appType === 'miniapp') {
                  window.location.hash = finalHref;
                  window.dispatchEvent(new HashChangeEvent('hashchange'));
                } else {
                  window.history.pushState({}, '', finalHref);
                  window.dispatchEvent(new Event('popstate'));
                }
              };
              document.addEventListener('click', window.mdClick, true);
            </script>
    <script id="iframe-onerror-catcher">
              const observer = new PerformanceObserver((list) => {
                list.getEntries().forEach((entry) => {
                  if (entry.initiatorType === 'script' && entry.responseStatus >= 400) {
                    window.parent.postMessage({
                      type: "RESOURCE_LOAD_ERROR",
                      name: entry.name,
                      status: entry.responseStatus
                    }, "*");
                    console.warn('[iframe-error] Resource failed:', entry.name, entry.responseStatus);
                  }
                });
              });
              observer.observe({ type: 'resource', buffered: true });
            </script>
  </body>
</html>
